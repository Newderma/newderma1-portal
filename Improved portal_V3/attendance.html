<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newderma1 Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#6abf4b;--green2:#5aaf3b;
  --gbg:rgba(106,191,75,.08);--gborder:rgba(106,191,75,.25);
  --bg:#f8fafc;--w:#ffffff;
  --sl:#1e293b;--sm:#475569;--ss:#94a3b8;
  --border:#e2e8f0;
  --teal:#16a34a;--tealb:rgba(22,163,74,.1);
  --red:#ef4444;--redb:rgba(239,68,68,.08);
  --gold:#d97706;--blue:#3b82f6;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shl:0 8px 32px rgba(0,0,0,.1);
}
html,body{min-height:100%;background:var(--bg);color:var(--sl);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#loginScreen{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;padding:1.5rem;background:linear-gradient(160deg,#f0fdf4 0%,#f8fafc 50%,#f0f9ff 100%)}
.lbox{background:#ffffff;border:1px solid var(--border);border-radius:16px;padding:2rem 1.8rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.llogo{text-align:center;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center}
.llogo img{max-height:90px;max-width:180px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(106,191,75,.2)) contrast(1.05) saturate(1.1)}
.llogo-title{font-size:1.1rem;font-weight:700;color:#1e293b;margin:.45rem 0 .1rem}
.llogo-arabic{font-size:1rem;color:#475569;font-family:'Noto Sans Arabic',sans-serif;direction:rtl;text-align:center;font-weight:400}
.lf{margin-bottom:.9rem}
.lf label{display:block;font-size:.75rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.32rem}
.lf input,.lf select{width:100%;padding:.62rem .88rem;background:#f8fafc;border:1.5px solid var(--border);border-radius:8px;color:#1e293b;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s}
.lf input:focus,.lf select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(106,191,75,.1);background:#fff}
.lf select option{background:#fff;color:#1e293b}
.lf input[readonly]{opacity:.65;cursor:default;background:var(--gbg)}
.lerr{background:var(--redb);color:#dc2626;border-radius:8px;padding:.5rem .88rem;font-size:.8rem;margin-bottom:.8rem;display:none}
.lerr.show{display:block}
.stamp-notice{background:var(--gbg);border:1px solid var(--gborder);border-radius:8px;padding:.45rem .88rem;font-size:.8rem;color:var(--green2);margin-bottom:.8rem;display:none}
.btnL{width:100%;padding:.72rem;background:#6abf4b;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s}
.btnL:hover{background:#5aaf3b}
.lhint{margin-top:.85rem;background:var(--gbg);border:1px solid var(--gborder);border-radius:8px;padding:.5rem .8rem;font-size:.72rem;color:var(--green2);line-height:1.55}
.lhint strong{font-weight:700}
.lback{text-align:center;margin-top:.85rem;font-size:.74rem}
.lback a{color:var(--ss);text-decoration:none}
.lback a:hover{color:var(--green)}

/* NAV — exact clinic tracker */
nav{background:#1e293b;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);gap:1rem}
.nbrand{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.nbrand span{color:#fff;font-size:1rem;font-weight:600}
.nbrand small{color:#94a3b8;font-size:.7rem;display:block;margin-top:-2px}
.nright{display:flex;align-items:center;gap:.5rem;min-width:0}
.ntabs{display:flex;gap:.2rem;overflow-x:auto}
.ntab{background:none;border:none;color:#ffffff;padding:.4rem .75rem;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;white-space:nowrap;flex-shrink:0}
.ntab:hover{color:#6abf4b;background:rgba(255,255,255,.1)}
.ntab.active{color:#fff;background:#6abf4b}
.nuser{display:flex;align-items:center;gap:.4rem;padding:.3rem .7rem;background:rgba(255,255,255,.08);border-radius:99px;color:#ffffff;font-size:.78rem;font-weight:500;flex-shrink:0}
.rb{font-size:.62rem;padding:.15rem .5rem;border-radius:99px;font-weight:700;text-transform:uppercase}
.rb-admin{background:#fef9c3;color:#854d0e}
.rb-staff{background:#dbeafe;color:#1e40af}
.user-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;margin-left:.3rem;flex-shrink:0}
.btnOut{background:none;border:1px solid rgba(255,255,255,.2);color:#ffffff;padding:.3rem .7rem;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.76rem;flex-shrink:0}
.btnOut:hover{border-color:#ef4444;color:#fca5a5}

/* APP */
#appShell{display:none;flex-direction:column;min-height:100vh}
.main{flex:1;padding:1.1rem;max-width:880px;width:100%;margin:0 auto}
.page{display:none}.page.active{display:block}
.ph{margin-bottom:1.1rem}
.ph h2{font-size:1.1rem;font-weight:700;color:var(--sl);margin-bottom:.15rem}
.ph p{font-size:.78rem;color:var(--sm)}
.card{background:#fff;border:1px solid var(--border);border-radius:13px;padding:1.3rem;margin-bottom:1.1rem;box-shadow:var(--sh)}
.ct{font-size:.68rem;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.75rem;margin-bottom:.75rem}
.fgrid .fw{grid-column:1/-1}
label{display:block;font-size:.7rem;font-weight:600;color:var(--sm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.28rem}
input,select{width:100%;padding:.6rem .85rem;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--sl);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--green)}
select option{background:#fff}

/* TOAST */
#toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sl);color:#fff;border-radius:99px;padding:.5rem 1.1rem;font-size:.8rem;opacity:0;transition:all .22s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green)}
#toast.err{background:var(--red)}

/* BUTTONS */
.btn{padding:.55rem 1rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{background:var(--green2)}
.btn-d{background:var(--redb);color:var(--red);border:1.5px solid rgba(239,68,68,.3)}.btn-d:hover{background:rgba(239,68,68,.15)}
.btn-s{background:#fff;color:var(--sm);border:1.5px solid var(--border)}.btn-s:hover{border-color:var(--green);color:var(--green)}
.btn-w{width:100%;justify-content:center}
.btn-sm{font-size:.78rem;padding:.32rem .65rem}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem}

/* GPS */
.gps-bar{display:flex;align-items:center;gap:.5rem;padding:.55rem .9rem;background:var(--bg);border-radius:9px;font-size:.78rem;color:var(--sm);margin-bottom:1rem;border:1px solid var(--border)}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--ss);flex-shrink:0}
.gps-dot.ok{background:#22c55e}.gps-dot.err{background:var(--red)}
.gps-dot.chk{background:var(--gold);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CLOCK PAGE */
.clock-wrap{max-width:400px;margin:0 auto;text-align:center;padding-top:.5rem}
.clock-time{font-size:3.2rem;font-weight:700;color:var(--sl);letter-spacing:-.02em;line-height:1}
.clock-date{font-size:.82rem;color:var(--sm);margin:.35rem 0 1.2rem}
.clock-card{background:#fff;border:1px solid var(--border);border-radius:13px;padding:1.5rem;box-shadow:var(--sh)}
.clock-greeting{font-size:.72rem;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
.clock-status{font-size:.82rem;color:var(--sm);margin-bottom:1.2rem;min-height:1.2rem}

/* STAFF GRID */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem;margin-top:.75rem}
.staff-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:.9rem .8rem;cursor:pointer;text-align:center;color:var(--sl);font-family:'DM Sans',sans-serif;transition:all .15s;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.staff-btn:hover{border-color:var(--gborder);background:var(--gbg)}
.staff-btn.in-now{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.06)}
.sb-name{font-size:.83rem;font-weight:600;margin-bottom:.22rem}
.sb-status{font-size:.68rem;color:var(--ss)}
.staff-btn.in-now .sb-status{color:#16a34a;font-weight:500}

/* TABLE */
.filter-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem;align-items:center}
.filter-row input,.filter-row select{width:auto;flex:1;min-width:120px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:.55rem .75rem;color:var(--ss);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border)}
td{padding:.6rem .75rem;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr:hover{background:var(--bg)}
.norec{text-align:center;color:var(--ss);font-style:italic;padding:1.8rem}
.badge-in{background:rgba(22,163,74,.1);color:#16a34a;padding:.18rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600}
.badge-out{background:var(--bg);color:var(--ss);padding:.18rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600}
.badge-late{background:var(--redb);color:var(--red);padding:.18rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600}
.badge-early{background:rgba(59,130,246,.1);color:var(--blue);padding:.18rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600}
.badge-ontime{background:rgba(22,163,74,.1);color:#16a34a;padding:.18rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600}

/* SETTINGS */
.staff-item{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;border-bottom:1px solid var(--border)}
.staff-item:last-child{border-bottom:none}
.si-name{font-weight:600;font-size:.86rem;color:var(--sl)}
.si-role{font-size:.73rem;color:var(--ss);margin-top:.1rem}
.pin-wrap{position:relative}
.pin-wrap input{padding-right:3rem}
.pin-toggle{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ss);font-size:.75rem;font-family:'DM Sans',sans-serif;padding:0}

/* PIN MODAL */
.pin-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(2px);z-index:5000;display:none;align-items:center;justify-content:center;padding:1rem}
.pin-overlay.open{display:flex}
.pin-box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.pin-title{font-size:1rem;font-weight:700;color:var(--sl);margin-bottom:.15rem}
.pin-sub{font-size:.8rem;color:var(--ss);margin-bottom:1.2rem}
.pin-dots{display:flex;justify-content:center;gap:.6rem;margin-bottom:1.2rem}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .12s}
.pin-dot.filled{background:var(--green);border-color:var(--green)}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
.pin-key{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs,9px);padding:.8rem;font-size:1.1rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--sl);transition:all .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pin-key:hover,.pin-key:active{background:var(--gbg);border-color:var(--gborder);color:var(--green2)}
.pin-key.del{font-size:.82rem;color:var(--ss)}
.pin-err{color:var(--red);font-size:.76rem;margin-top:.55rem;min-height:1em}

@media(max-width:580px){
  nav{padding:0 .75rem;height:52px}
  .ntabs{display:none}
  .nright{gap:.3rem}
  .nbrand span{font-size:.82rem;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nbrand small{display:none}
  .nuser{padding:.25rem .5rem;gap:.3rem;max-width:130px;overflow:hidden}
  #userLabel{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:85px;font-size:.74rem}
  .rb{display:none}
  .user-dot{display:none}
  .btnOut{padding:.25rem .5rem;font-size:.7rem}
  .fgrid{grid-template-columns:1fr}
  .clock-time{font-size:2.6rem}
}


/* CLOCK CONFIRM FLASH */
.clock-confirm{position:fixed;inset:0;z-index:8000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:rgba(22,163,74,.97)}
.clock-confirm.show{display:flex}
.cc-check{font-size:4rem}
.cc-title{color:#fff;font-size:1.4rem;font-weight:800}
.cc-sub{color:rgba(255,255,255,.85);font-size:.9rem}
.cc-badge{background:rgba(255,255,255,.2);color:#fff;border-radius:99px;padding:.3rem .9rem;font-size:.82rem;font-weight:600}
</style>
</head>

<script>
function esc(s){if(!s)return'';s=String(s);s=s.split('&').join('&amp;');s=s.split('<').join('&lt;');s=s.split('>').join('&gt;');s=s.split('"').join('&quot;');s=s.split("'").join('&#39;');return s;}
var _cModalCb=null;
function showCModal(opts){
  document.getElementById('cModalIcon').textContent=opts.icon||'⚠️';
  document.getElementById('cModalTitle').textContent=opts.title||'Are you sure?';
  document.getElementById('cModalMsg').textContent=opts.msg||'';
  var det=document.getElementById('cModalDetail');
  if(opts.detail){det.textContent=opts.detail;det.style.display='';}else{det.style.display='none';}
  var inp=document.getElementById('cModalInput');
  if(opts.inputLabel){
    inp.style.display='';inp.value='';inp.placeholder=opts.inputLabel;
    // PIN inputs: numeric, 4 digits. Password inputs: free text
    if(opts.inputType==='pin'){
      inp.type='tel';inp.inputMode='numeric';inp.maxLength=4;inp.style.textAlign='center';inp.style.letterSpacing='.3em';
    } else {
      inp.type='text';inp.inputMode='';inp.maxLength=524288;inp.style.textAlign='left';inp.style.letterSpacing='normal';
    }
  } else { inp.style.display='none'; }
  var ok=document.getElementById('cModalOkBtn');
  ok.textContent=opts.okLabel||'Confirm';
  ok.style.background=opts.okStyle||'var(--red)';ok.style.color='#fff';ok.style.border='none';
  _cModalCb=opts.onOk||null;
  document.getElementById('cModal').style.display='flex';
}
function closeCModal(){document.getElementById('cModal').style.display='none';_cModalCb=null;}
function doCModal(){
  var inp=document.getElementById('cModalInput');
  var val=inp.style.display!=='none'?inp.value.trim():null;
  document.getElementById('cModal').style.display='none';
  if(_cModalCb)_cModalCb(val);_cModalCb=null;
}
function showClockConfirm(action,staffName,clockTime){
  var el=document.getElementById('clockConfirm');if(!el)return;
  var isIn=action==='in';
  el.style.background=isIn?'rgba(22,163,74,.97)':'rgba(30,41,59,.97)';
  document.getElementById('ccTitle').textContent=isIn?'Clocked IN':'Clocked OUT';
  document.getElementById('ccSub').textContent=staffName+' at '+fmtTime(clockTime);
  var badge=document.getElementById('ccBadge');
  if(isIn){
    var arr=calcArr(clockTime);var g=cfg.graceMin!=null?cfg.graceMin:10;
    if(arr===null){badge.style.display='none';}
    else if(arr<-g){badge.textContent='⏰ Late '+Math.abs(arr)+' min';badge.style.display='';}

// GPS
function haversine(a,b,c,d){var R=6371000,dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180,x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function startGPS(cb){
  var bar=document.getElementById('gpsBar');
  var setBar=function(cls,txt){
    if(bar){
      bar.querySelector('.gps-dot').className='gps-dot '+cls;
      bar.querySelector('.gps-txt').textContent=txt;
    }
  };
  setBar('chk','Checking location...');
  if(!navigator.geolocation){gpsOk=false;setBar('err','GPS not available');if(cb)cb(false);return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      userCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};
      if(!cfg.clinicLat||!cfg.clinicLng){gpsOk=true;setBar('ok','Location OK');if(cb)cb(true);return;}
      var dist=haversine(userCoords.lat,userCoords.lng,cfg.clinicLat,cfg.clinicLng);
      gpsOk=dist<=(cfg.radiusM||150);
      setBar(gpsOk?'ok':'err',gpsOk?'At clinic ('+Math.round(dist)+'m)':'Too far ('+Math.round(dist)+'m)');
      if(cb)cb(gpsOk);
    },
    function(){gpsOk=false;setBar('err','Location denied');if(cb)cb(false);},
    {enableHighAccuracy:true,timeout:10000}
  );
}

// ── LOGS ──────────────────────────────────────────────────────────────────
function fmtTime(iso){if(!iso)return '-';return new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}
function fmtDate(d){if(!d)return '-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function calcDur(cin,cout){if(!cin||!cout)return '-';var ms=new Date(cout)-new Date(cin);if(ms<0)return '-';return Math.floor(ms/3600000)+'h '+Math.floor((ms%3600000)/60000)+'m';}
function calcArr(ci){
  if(!cfg.workStart||!ci)return null;
  var cin=new Date(ci),p=cfg.workStart.split(':'),ref=new Date(cin);
  ref.setHours(+p[0],+p[1],0,0);
  // Overnight shift: if workStart>=12 and clock-in hour<12 => previous day
  if(+p[0]>=12&&cin.getHours()<12)ref.setDate(ref.getDate()-1);
  return Math.round((ref-cin)/60000);
}
function calcDep(co){
  if(!cfg.workEnd||!co)return null;
  var cout=new Date(co),p=cfg.workEnd.split(':'),ref=new Date(cout);
  ref.setHours(+p[0],+p[1],0,0);
  if(cfg.workEnd<cfg.workStart&&cout.getHours()>=12)ref.setDate(ref.getDate()+1);
  return Math.round((cout-ref)/60000);
}
function arrBadge(d){
  if(d===null)return '<span style="color:var(--txt2)">-</span>';
  var g=cfg.graceMin!=null?cfg.graceMin:10,m=Math.abs(d);
  if(d<-g)return '<span class="badge-late">Late '+m+' min</span>';
  if(d>g)return '<span class="badge-early">Early '+m+' min</span>';
  return '<span class="badge-ontime">On Time</span>';
}
function depBadge(d){
  if(d===null)return '<span style="color:var(--txt2)">-</span>';
  var g=cfg.graceMin!=null?cfg.graceMin:10,m=Math.abs(d);
  if(d<-g)return '<span class="badge-late">Left Early '+m+' min</span>';
  if(d>g)return '<span class="badge-ontime">Stayed +'+m+' min</span>';
  return '<span class="badge-ontime">On Time</span>';
}

    var cur=sf.value;
    var names=[...new Set(allLogs.map(function(r){return r.staff_name;}))].sort();
    sf.innerHTML='<option value="">All Staff</option>'+names.map(function(n){
      return '<option'+(n===cur?' selected':'')+'>'+n+'</option>';
    }).join('');
  }
  filterLogs();
}
function filterLogs(){
  var staff=(document.getElementById('logStaff')||{}).value||'';
  var list=staff?allLogs.filter(function(r){return r.staff_name===staff;}):allLogs;
  var tb=document.getElementById('logsTable');if(!tb)return;
  if(!list.length){tb.innerHTML='<tr><td colspan="10" class="norec">No records found.</td></tr>';return;}
  var g=cfg.graceMin!=null?cfg.graceMin:10;
  tb.innerHTML=list.map(function(r){
    var arr=calcArr(r.clock_in),dep=calcDep(r.clock_out);
    var lm=(arr!==null&&arr<-g)?Math.abs(arr):0,em=(dep!==null&&dep<-g)?Math.abs(dep):0,pen=lm+em;
    var penStr=pen>0?'<span style="color:var(--red);font-weight:600">-'+pen+' min</span>':'<span style="color:var(--teal)">0</span>';
    var status=r.clock_out?'<span class="badge-out">Done</span>':'<span class="badge-in">Active</span>';
    return '<tr><td>'+fmtDate(r.date)+'</td><td><strong>'+r.staff_name+'</strong></td>'+
      '<td>'+fmtTime(r.clock_in)+'</td><td>'+fmtTime(r.clock_out)+'</td>'+
      '<td>'+calcDur(r.clock_in,r.clock_out)+'</td><td>'+status+'</td>'+
      '<td>'+arrBadge(arr)+'</td><td>'+depBadge(dep)+'</td><td>'+penStr+'</td>'+
      '<td><button class="btn btn-d btn-sm" onclick="delRec('+r.id+')">Del</button></td></tr>';
  }).join('');
}
async function delRec(id){
  showCModal({icon:'🗑️',title:'Delete Record?',msg:'Permanently delete this record?',okLabel:'Yes, Delete',okStyle:'var(--red)',onOk:async function(){try{await sbDel('att_records','id=eq.'+id);allLogs=allLogs.filter(function(r){return r.id!=id;});records=records.filter(function(r){return r.id!=id;});filterLogs();renderLive();toast('Deleted.',true);}catch(e){toast('Failed: '+e.message,false);}}});return;
  try{
    await sbDel('att_records','id=eq.'+id);
    allLogs=allLogs.filter(function(r){return r.id!=id;});
    records=records.filter(function(r){return r.id!=id;});
    filterLogs();renderLive();toast('Deleted.',true);
  }catch(e){toast('Failed: '+e.message,false);}
}
function exportCSV(){
  var g=cfg.graceMin!=null?cfg.graceMin:10;
  var staff=(document.getElementById('logStaff')||{}).value||'';
  var list=staff?allLogs.filter(function(r){return r.staff_name===staff;}):allLogs;
  var csv='Date,Name,Clock In,Clock Out,Duration,Status,Arrival,Departure,Penalty Min\n';
  csv+=list.map(function(r){
    var arr=calcArr(r.clock_in),dep=calcDep(r.clock_out);
    var lm=(arr!==null&&arr<-g)?Math.abs(arr):0,em=(dep!==null&&dep<-g)?Math.abs(dep):0;
    var al=arr===null?'':arr<-g?'Late '+Math.abs(arr)+' min':arr>g?'Early '+Math.abs(arr)+' min':'On Time';
    var dl=dep===null?'':dep<-g?'Left Early '+Math.abs(dep)+' min':dep>g?'Stayed +'+Math.abs(dep)+' min':'On Time';
    return [fmtDate(r.date),r.staff_name,fmtTime(r.clock_in),fmtTime(r.clock_out),
      calcDur(r.clock_in,r.clock_out),r.clock_out?'Done':'Active',al,dl,
      (lm+em>0?'-'+(lm+em)+' min':'0')].join(',');
  }).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='attendance-'+todayStr()+'.csv';a.click();
}
function exportXLS(){
  var g=cfg.graceMin!=null?cfg.graceMin:10;
  var staff=(document.getElementById('logStaff')||{}).value||'';
  var list=staff?allLogs.filter(function(r){return r.staff_name===staff;}):allLogs;
  var rows=[['Date','Name','Clock In','Clock Out','Duration','Status','Arrival','Departure','Penalty Min']];
  list.forEach(function(r){
    var arr=calcArr(r.clock_in),dep=calcDep(r.clock_out);
    var lm=(arr!==null&&arr<-g)?Math.abs(arr):0,em=(dep!==null&&dep<-g)?Math.abs(dep):0;
    var al=arr===null?'':arr<-g?'Late '+Math.abs(arr)+' min':arr>g?'Early '+Math.abs(arr)+' min':'On Time';
    var dl=dep===null?'':dep<-g?'Left Early '+Math.abs(dep)+' min':dep>g?'Stayed +'+Math.abs(dep)+' min':'On Time';
    rows.push([fmtDate(r.date),r.staff_name,fmtTime(r.clock_in),fmtTime(r.clock_out),
      calcDur(r.clock_in,r.clock_out),r.clock_out?'Done':'Active',al,dl,
      (lm+em>0?'-'+(lm+em)+' min':'0')]);
  });
  var xml='<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Attendance"><Table>';
  rows.forEach(function(row){
    xml+='<Row>'+row.map(function(c){
      return '<Cell><Data ss:Type="String">'+String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</Data></Cell>';
    }).join('')+'</Row>';
  });
  xml+='</Table></Worksheet></Workbook>';
  var a=document.createElement('a');
  a.href='data:application/vnd.ms-excel;charset=utf-8,'+encodeURIComponent(xml);
  a.download='attendance-'+todayStr()+'.xls';a.click();
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function buildSettingsPage(){
  var h=[];
  h.push('<div class="page" id="page-settings">');
  h.push('<div class="ph"><h2>Settings</h2></div>');

  // Staff
  h.push('<div class="card" style="max-width:540px">');
  h.push('<div class="ct">Staff Members</div>');
  h.push('<div class="fgrid" style="margin-bottom:.9rem">');
  h.push('<div><label>Name</label><input type="text" id="newStaffName" placeholder="Staff name"></div>');
  h.push('<div><label>Login Password</label><input type="text" id="newStaffPassword" placeholder="e.g. mypass123"></div>');
  h.push('<div><label>Clock-in PIN (4 digits)</label>');
  h.push('<div class="pin-wrap"><input type="password" inputmode="numeric" id="newStaffPin" placeholder="1234" maxlength="4">');
  h.push('<button class="pin-toggle" onclick="togglePinInput(\'newStaffPin\',this)">Show</button></div>');
  h.push('</div></div>');
  h.push('<button class="btn btn-p" onclick="addStaff()">+ Add Staff</button>');
  h.push('<div id="staffListAdmin" style="margin-top:1.1rem"></div>');
  h.push('</div>');

  // Working hours
  h.push('<div class="card" style="max-width:540px">');
  h.push('<div class="ct">Working Hours</div>');
  h.push('<div class="fgrid">');
  h.push('<div><label>Work Start</label><input type="time" id="cfgWorkStart"></div>');
  h.push('<div><label>Work End</label><input type="time" id="cfgWorkEnd"></div>');
  h.push('<div><label>Grace Period (min)</label><input type="number" id="cfgGrace" min="0" max="60" placeholder="10"></div>');
  h.push('</div>');
  h.push('<button class="btn btn-p" onclick="saveWorkHours()">Save Working Hours</button>');
  h.push('</div>');

  // GPS
  h.push('<div class="card" style="max-width:540px">');
  h.push('<div class="ct">GPS Settings</div>');
  h.push('<p style="font-size:.8rem;color:var(--txt2);margin-bottom:.9rem">Staff must be within radius to clock in. Admin is never GPS-blocked.</p>');
  h.push('<div class="fgrid">');
  h.push('<div><label>Clinic Latitude</label><input type="number" id="cfgLat" step="any"></div>');
  h.push('<div><label>Clinic Longitude</label><input type="number" id="cfgLng" step="any"></div>');
  h.push('<div class="fw"><label>Radius (meters)</label><input type="number" id="cfgRadius" placeholder="150"></div>');
  h.push('</div>');
  h.push('<div class="btn-row">');
  h.push('<button class="btn btn-p" onclick="saveGPS()">Save GPS</button>');
  h.push('<button class="btn btn-s" onclick="useMyLoc()">Use My Location</button>');
  h.push('</div>');
  h.push('<div id="gpsStatus" style="font-size:.76rem;color:var(--green);margin-top:.5rem"></div>');
  h.push('</div>');

  // Passwords
  h.push('<div class="card" style="max-width:540px">');

  h.push('<div class="fgrid">');

  h.push('</div>');
  h.push('<button class="btn btn-p" onclick="savePasswords()">Save Admin Password</button>');
  h.push('</div>');

  // Phone stamps
  h.push('<div class="card" style="max-width:540px">');
  h.push('<div class="ct">Phone Stamps</div>');
  h.push('<p style="font-size:.8rem;color:var(--txt2);margin-bottom:.9rem">Each staff phone is stamped on first clock-in. Clear here if staff gets a new phone.</p>');

function renderSettings(){
  var ws=document.getElementById('cfgWorkStart');if(ws&&cfg.workStart)ws.value=cfg.workStart;
  var we=document.getElementById('cfgWorkEnd');if(we&&cfg.workEnd)we.value=cfg.workEnd;
  var gp=document.getElementById('cfgGrace');if(gp)gp.value=cfg.graceMin!=null?cfg.graceMin:10;
  var lat=document.getElementById('cfgLat');if(lat&&cfg.clinicLat)lat.value=cfg.clinicLat;
  var lng=document.getElementById('cfgLng');if(lng&&cfg.clinicLng)lng.value=cfg.clinicLng;
  var rad=document.getElementById('cfgRadius');if(rad)rad.value=cfg.radiusM||150;
  renderStaffList();renderStampList();
}

function renderStaffList(){
  var el=document.getElementById('staffListAdmin');if(!el)return;
  if(!staffList.length){el.innerHTML='<div style="font-size:.8rem;color:var(--txt2)">No staff added yet.</div>';return;}
  el.innerHTML=staffList.map(function(s,i){
    return '<div class="staff-item">'+
      '<div>'+
        '<div class="si-name">'+s.name+'</div>'+
        '<div class="si-role">PIN: <span id="pv'+i+'">&#9679;&#9679;&#9679;&#9679;</span> '+
          '<button data-idx="'+i+'" onclick="toggleStaffPin(this)" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:.72rem;font-family:inherit">Show</button>'+
        '</div>'+
        '<div class="si-role" style="margin-top:.2rem">Password: <span id="pw'+i+'">&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;</span> '+
          '<button data-idx="'+i+'" onclick="toggleStaffPwd(this)" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:.72rem;font-family:inherit">Show</button>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:.4rem;flex-wrap:wrap">'+
        '<button class="btn btn-s btn-sm" onclick="editStaffName('+i+')">✏️ Edit Name</button>'+
        '<button class="btn btn-s btn-sm" onclick="resetPin('+i+')">Reset PIN</button>'+
        '<button class="btn btn-s btn-sm" onclick="resetStaffPassword('+i+')">Reset Password</button>'+
        '<button class="btn btn-d btn-sm" onclick="removeStaff('+i+')">Remove</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleStaffPin(btn){
  var i=parseInt(btn.dataset.idx);var s=staffList[i];if(!s)return;var pin=s.pin;
  var el=document.getElementById('pv'+i);if(!el)return;
  var nb=el.nextElementSibling;
  if(nb.textContent==='Show'){el.textContent=pin;nb.textContent='Hide';}
  else{el.innerHTML='&#9679;&#9679;&#9679;&#9679;';nb.textContent='Show';}
}
function togglePinInput(id,btn){
  var inp=document.getElementById(id);if(!inp)return;
  if(inp.type==='password'){inp.type='text';btn.textContent='Hide';}
  else{inp.type='password';btn.textContent='Show';}
}
function toggleStaffPwd(btn){
  var i=parseInt(btn.dataset.idx);var s=staffList[i];if(!s)return;
  var el=document.getElementById('pw'+i);if(!el)return;
  if(btn.textContent==='Show'){el.textContent=s.password||'staff123';btn.textContent='Hide';}
  else{el.innerHTML='&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;';btn.textContent='Show';}
}
async function resetStaffPassword(i){
  showCModal({icon:'🔑',title:'Reset Password',msg:'Enter new login password for '+staffList[i].name+':',inputLabel:'New Password',okLabel:'Save',okStyle:'var(--green)',onOk:async function(p){
    if(!p||!p.trim()){toast('Enter a password',false);return;}
    var old=staffList[i].password;staffList[i].password=p.trim();
    try{await saveStaff();toast('Password updated!',true);renderStaffList();}
    catch(e){staffList[i].password=old;toast('Failed.',false);}
  }});
}
function renderStampList(){
  var el=document.getElementById('stampList');if(!el)return;
  var stamps=cfg.phoneStamps||[];
  if(!stamps.length){el.innerHTML='<div style="font-size:.8rem;color:var(--txt2)">No phones stamped yet.</div>';return;}
  el.innerHTML=stamps.map(function(s,i){
    return '<div class="staff-item">'+
      '<div>'+
        '<div class="si-name">'+s.name+'</div>'+
        '<div class="si-role">Stamped: '+new Date(s.stamped).toLocaleDateString()+'</div>'+
      '</div>'+
      '<button class="btn btn-d btn-sm" onclick="clearPhoneStamp('+i+')">Clear Stamp</button>'+
    '</div>';
  }).join('');
}

async function clearPhoneStamp(i){
  var s=cfg.phoneStamps[i];
  showCModal({icon:'📱',title:'Clear Phone Stamp?',msg:'Clear stamp for '+s.name+'? They will re-stamp on next clock-in.',okLabel:'Yes, Clear',okStyle:'var(--red)',onOk:async function(){cfg.phoneStamps.splice(i,1);try{await saveCfg();renderStampList();toast('Stamp cleared',true);}catch(e){cfg.phoneStamps.splice(i,0,s);toast('Failed.',false);}}});return;
  cfg.phoneStamps.splice(i,1);
  try{await saveCfg();renderStampList();toast('Stamp cleared for '+s.name,true);}
  catch(e){cfg.phoneStamps.splice(i,0,s);toast('Failed.',false);}
}
async function addStaff(){
  var name=document.getElementById('newStaffName').value.trim();
  var pin=document.getElementById('newStaffPin').value.trim();
  if(!name){toast('Enter staff name',false);return;}
  if(!/^\d{4}$/.test(pin)){toast('PIN must be 4 digits',false);return;}
  if(staffList.find(function(s){return s.name.toLowerCase()===name.toLowerCase();})){toast('Already exists',false);return;}
  var pwd=document.getElementById('newStaffPassword').value.trim()||'staff123';
  staffList.push({id:Date.now(),name:name,pin:pin,password:pwd,active:true});
  try{await saveStaff();document.getElementById('newStaffName').value='';document.getElementById('newStaffPin').value='';document.getElementById('newStaffPassword').value='';toast(name+' added!',true);renderStaffList();}
  catch(e){staffList.pop();toast('Failed: '+e.message,false);}
}
async function editStaffName(i){
  showCModal({icon:'✏️',title:'Edit Staff Name',msg:'Current name: '+staffList[i].name,inputLabel:'New name',okLabel:'Save',okStyle:'var(--green)',onOk:async function(newName){
    if(!newName||!newName.trim()){toast('Enter a name',false);return;}
    newName=newName.trim();
    if(staffList.find(function(s,idx){return idx!==i&&s.name.toLowerCase()===newName.toLowerCase();})){toast('Name already exists',false);return;}
    var old=staffList[i].name;
    staffList[i].name=newName;
    // Update phone stamp if this person had one
    var stamps=cfg.phoneStamps||[];
    stamps.forEach(function(s){if(s.name.toLowerCase()===old.toLowerCase())s.name=newName;});
    try{await saveStaff();await saveCfg();populateLoginDropdown();renderStaffList();toast('Name updated!',true);}
    catch(e){staffList[i].name=old;toast('Failed: '+e.message,false);}
  }});
}
async function removeStaff(i){
  showCModal({icon:'👤',title:'Remove Staff?',msg:'Remove this staff member from the list?',okLabel:'Yes, Remove',okStyle:'var(--red)',onOk:async function(){var rem=staffList.splice(i,1);try{await saveStaff();renderStaffList();toast('Removed.',true);}catch(e){staffList.splice(i,0,rem[0]);toast('Failed.',false);}}});return;
  var rem=staffList.splice(i,1);
  try{await saveStaff();renderStaffList();toast('Removed.',true);}
  catch(e){staffList.splice(i,0,rem[0]);toast('Failed.',false);}
}
async function resetPin(i){
  showCModal({icon:'🔑',title:'Reset PIN',msg:'Enter new 4-digit PIN:',inputLabel:'New PIN',inputType:'pin',okLabel:'Save',okStyle:'var(--green)',onOk:async function(p){if(!p||!/^\d{4}$/.test(p)){toast('PIN must be 4 digits',false);return;}var old=staffList[i].pin;staffList[i].pin=p;try{await saveStaff();toast('PIN updated!',true);}catch(e){staffList[i].pin=old;toast('Failed.',false);}}});return;
}
async function saveWorkHours(){
  cfg.workStart=document.getElementById('cfgWorkStart').value||'';
  cfg.workEnd=document.getElementById('cfgWorkEnd').value||'';
  cfg.graceMin=parseInt(document.getElementById('cfgGrace').value)||0;
  try{await saveCfg();toast('Working hours saved!',true);}
  catch(e){toast('Failed.',false);}
}
function useMyLoc(){
  navigator.geolocation.getCurrentPosition(
    function(pos){
      document.getElementById('cfgLat').value=pos.coords.latitude.toFixed(6);
      document.getElementById('cfgLng').value=pos.coords.longitude.toFixed(6);
      document.getElementById('gpsStatus').textContent='Location captured. Click Save GPS.';
    },
    function(){toast('Could not get location',false);}
  );
}
async function saveGPS(){
  var lat=parseFloat(document.getElementById('cfgLat').value);
  var lng=parseFloat(document.getElementById('cfgLng').value);
  var rad=parseInt(document.getElementById('cfgRadius').value)||150;
  if(isNaN(lat)||isNaN(lng)){toast('Enter valid coordinates',false);return;}
  cfg.clinicLat=lat;cfg.clinicLng=lng;cfg.radiusM=rad;
  try{await saveCfg();toast('GPS saved!',true);document.getElementById('gpsStatus').textContent='Saved.';}
  catch(e){toast('Failed.',false);}
}
async function savePasswords(){
  var ap=document.getElementById('newAdminPass').value.trim();
  if(!ap){toast('Enter a new admin password',false);return;}
  cfg.adminPass=ap;
  try{
    await saveCfg();toast('Admin password updated!',true);
    document.getElementById('newAdminPass').value='';
  }catch(e){toast('Failed.',false);}
}

// ── INIT ──────────────────────────────────────────────────────────────────
function withTimeout(p,ms){
  return Promise.race([p,new Promise(function(_,r){setTimeout(function(){r(new Error('timeout'));},ms);})]);
}

async function init(){
  // Fallback: show login after 7s if everything fails
  var fb=setTimeout(function(){
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
  },7000);

  try{await withTimeout(loadCfg(),5000);}catch(e){}
  try{await withTimeout(loadStaff(),5000);}catch(e){}
  clearTimeout(fb);
  document.getElementById('loadingScreen').style.display='none';
  populateLoginDropdown();

  // Validate staff stamp against Supabase — if admin cleared it, wipe locally too
  var stamp=getStamp();
  if(stamp){
    var stampOK=(cfg.phoneStamps||[]).some(function(p){
      return p.name.toLowerCase()===stamp.toLowerCase();
    });
    if(!stampOK){
      clearStamp();
      stamp=null;
    }
  }

  // Restore session
  loadSession();

  // Admin: restore from sessionStorage (survives refresh, clears on tab close)
  if(CU&&CU.role==='admin'){
    document.getElementById('loginScreen').style.display='none';
    bootApp();
    return;
  }

  // Staff: restore from localStorage (survives navigation from index)
  if(CU&&CU.role==='staff'){
    var sessionInvalid=stamp&&stamp.toLowerCase()!==CU.name.toLowerCase();
    if(sessionInvalid){clearSession();CU=null;}
    else{
      document.getElementById('loginScreen').style.display='none';
      bootApp();
      return;
    }
  }

  // No valid session — show login
  CU=null;

  // If stamp exists, pre-fill and lock the name dropdown
  if(stamp){
    var sn=document.getElementById('stampNotice');
    if(sn){sn.style.display='block';sn.textContent='This phone belongs to: '+stamp;}
    var ne=document.getElementById('loginName');
    if(ne){ne.value=stamp;ne.disabled=true;ne.style.opacity='.65';}
  }

  document.getElementById('loginScreen').style.display='flex';
}

init();

</script>
